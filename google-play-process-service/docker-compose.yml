services:
  postgres:
    image: postgres:16
    container_name: google-play-postgres
    environment:
      POSTGRES_DB: google_play_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d google_play_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: google-play-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: google_play_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: 8080
    ports:
      - "${APP_HOST_PORT:-24987}:8080"

volumes:
  postgres_data:
